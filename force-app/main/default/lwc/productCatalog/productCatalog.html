<template>
    <div class="slds-grid slds-wrap">
        <div class="slds-col slds-size_1-of-4 slds-p-right_x-small">
    <lightning-combobox
            name="ALL"
            label="Category"
            value={value}
            options={options}
            onchange={handleChange} ></lightning-combobox>
        </div>
        <div class="slds-col slds-size_1-of-4 slds-p-right_x-small">
            <lightning-combobox
            name="ALL"
            label="Sort by Price"
            value={value}
            options={options1}
            onchange={handleChange1} ></lightning-combobox>
        </div>

        <div class="slds-col slds-size_1-of-4 slds-p-right_x-small">
            <lightning-combobox
            name="ALL"
            label="Sort by Rating"
            value={value}
            options={options2}
            onchange={handleChange2} ></lightning-combobox>
        </div>
        <div class="slds-col slds-size_1-of-4 slds-p-right_x-small slds-p-top_large">
        <lightning-button variant="neutral" label="Add Filters" onclick={addFilter}></lightning-button>
        </div>
        </div>
         
        <div class="slds-grid slds-wrap">
            <template for:each={mainData} for:item="product1" for:index="index">
            <div key={product1.id}  class="slds-size_1-of-3 slds-p-around_small">
             <lightning-card>
              <div class="slds-p-around_medium">
              <h1><b>{product1.name}</b></h1>
              <img src={product1.image} alt={product1.name} width="100%" height="100px" style="object-fit: contain;">
              <p>{product1.description}</p>
              <h2><span class="slds-text-title_bold">Price: </span>{product1.price}</h2>
              <h2><span class="slds-text-title_bold">Stock: </span>{product1.stockStatus}</h2>
              <h2><span class="slds-text-title_bold">Rating:</span> {product1.rating}</h2>
               <lightning-button variant="brand" label="View Details" data-index={index} onclick={openModal}></lightning-button>
               </div>
             </lightning-card>
             </div>
            </template>
        </div>


        <template if:true={isModalOpen}>
            <section class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">{proData.name}</h2>
                        <button class="slds-modal__close btn" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"
                                class="iconC"></lightning-icon>
        
                        </button>
                    </header>
        
                    <div class="slds-modal__content slds-p-around_medium">
                        <template if:false={proData}>
                            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                        </template>
                        <template if:true={proData}>
                            <h2><span class="slds-text-title_bold">Description: </span>{proData.description}</h2>
                            <h2><span class="slds-text-title_bold">Price: </span>{proData.price}</h2>
                            <h2><span class="slds-text-title_bold">Stock: </span>{proData.stockStatus}</h2>
                            <h2><span class="slds-text-title_bold">Rating:</span> {proData.rating}</h2>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button variant="brand" label="Close" onclick={closeModal}
                            class="slds-m-left_x-small a4 slds-p-around_xxx-small"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open">
            </div>
        </template>
</template>
